<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bot Tracker — Over HT 0.5</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0c0f;
    --surface: #111418;
    --surface2: #181c22;
    --border: #1e2530;
    --accent: #00e5a0;
    --accent2: #0084ff;
    --red: #ff3b5c;
    --text: #e8edf3;
    --muted: #5a6475;
    --mono: 'IBM Plex Mono', monospace;
    --sans: 'Syne', sans-serif;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100vh;
    padding: 0 0 60px;
  }

  header {
    padding: 28px 24px 20px;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center;
    position: sticky; top: 0;
    background: var(--bg); z-index: 100; gap: 10px;
  }

  .logo-icon {
    width: 32px; height: 32px;
    background: var(--accent); border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px;
  }
  .logo-text { font-size: 16px; font-weight: 800; letter-spacing: -0.5px; }
  .logo-sub {
    font-family: var(--mono); font-size: 10px;
    color: var(--accent); letter-spacing: 2px;
    text-transform: uppercase; margin-top: 1px;
  }

  .stats-bar {
    display: grid; grid-template-columns: repeat(4, 1fr);
    gap: 1px; background: var(--border);
    border-bottom: 1px solid var(--border);
  }

  .stat-item { background: var(--surface); padding: 16px 10px; text-align: center; }

  .stat-value {
    font-family: var(--mono); font-size: 22px;
    font-weight: 500; line-height: 1; margin-bottom: 4px;
  }

  .stat-value.green { color: var(--accent); }
  .stat-value.red { color: var(--red); }
  .stat-value.blue { color: var(--accent2); }
  .stat-value.white { color: var(--text); }

  .stat-label {
    font-size: 9px; color: var(--muted);
    text-transform: uppercase; letter-spacing: 1.5px;
    font-family: var(--mono);
  }

  .form-section {
    padding: 20px 16px;
    border-bottom: 1px solid var(--border);
  }

  .form-title {
    font-size: 11px; color: var(--muted);
    text-transform: uppercase; letter-spacing: 2px;
    font-family: var(--mono); margin-bottom: 14px;
  }

  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }

  .field { display: flex; flex-direction: column; gap: 5px; }

  .field label {
    font-size: 10px; color: var(--muted);
    text-transform: uppercase; letter-spacing: 1.5px;
    font-family: var(--mono);
  }

  .field input {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px; color: var(--text);
    font-family: var(--mono); font-size: 13px;
    padding: 9px 12px; outline: none;
    transition: border-color 0.2s; width: 100%;
  }

  .field input:focus { border-color: var(--accent); }

  /* GOLS SECTION */
  .gols-label {
    font-size: 10px; color: var(--muted);
    text-transform: uppercase; letter-spacing: 1.5px;
    font-family: var(--mono); margin-bottom: 8px;
  }

  .gols-list {
    display: flex; flex-direction: column; gap: 6px;
    margin-bottom: 8px;
  }

  .gol-row {
    display: flex; align-items: center; gap: 8px;
  }

  .gol-row input {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px; color: var(--text);
    font-family: var(--mono); font-size: 13px;
    padding: 8px 12px; outline: none;
    transition: border-color 0.2s; flex: 1;
  }

  .gol-row input:focus { border-color: var(--accent2); }

  .btn-remove-gol {
    background: none; border: 1px solid var(--border);
    border-radius: 6px; color: var(--muted);
    cursor: pointer; padding: 8px 10px;
    font-family: var(--mono); font-size: 12px;
    transition: all 0.2s; white-space: nowrap;
  }

  .btn-remove-gol:hover { border-color: var(--red); color: var(--red); }

  .btn-add-gol {
    background: transparent;
    border: 1px dashed var(--border);
    border-radius: 6px; color: var(--muted);
    font-family: var(--mono); font-size: 11px;
    padding: 8px; cursor: pointer;
    transition: all 0.2s; width: 100%;
    letter-spacing: 1px; margin-bottom: 10px;
  }

  .btn-add-gol:hover { border-color: var(--accent2); color: var(--accent2); }

  .result-selector { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 10px; }

  .result-btn {
    padding: 10px; border-radius: 6px;
    border: 1px solid var(--border);
    background: var(--surface2); color: var(--muted);
    font-family: var(--mono); font-size: 12px;
    cursor: pointer; transition: all 0.2s; text-align: center;
  }

  .result-btn.selected-green { background: rgba(0,229,160,0.12); border-color: var(--accent); color: var(--accent); }
  .result-btn.selected-red { background: rgba(255,59,92,0.12); border-color: var(--red); color: var(--red); }

  .btn-add {
    width: 100%; padding: 12px;
    background: var(--accent); color: #000;
    border: none; border-radius: 8px;
    font-family: var(--sans); font-size: 13px;
    font-weight: 700; letter-spacing: 1px;
    text-transform: uppercase; cursor: pointer;
    transition: opacity 0.2s; margin-top: 4px;
  }

  .btn-add:hover { opacity: 0.85; }

  .btn-export {
    width: 100%; padding: 10px; margin-top: 8px;
    background: transparent; border: 1px solid var(--border);
    border-radius: 8px; color: var(--muted);
    font-family: var(--mono); font-size: 12px;
    cursor: pointer; letter-spacing: 1px; transition: all 0.2s;
  }

  .btn-export:hover { border-color: var(--accent2); color: var(--accent2); }

  .table-section { padding: 16px; }

  .table-header {
    display: flex; align-items: center;
    justify-content: space-between; margin-bottom: 12px;
  }

  .table-title {
    font-size: 11px; color: var(--muted);
    text-transform: uppercase; letter-spacing: 2px;
    font-family: var(--mono);
  }

  .entry-count {
    font-family: var(--mono); font-size: 11px;
    color: var(--accent); background: rgba(0,229,160,0.08);
    padding: 3px 10px; border-radius: 20px;
  }

  .entries-list { display: flex; flex-direction: column; gap: 8px; }

  .entry-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px; padding: 14px 16px;
    animation: slideIn 0.3s ease;
  }

  @keyframes slideIn {
    from { opacity: 0; transform: translateY(-8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .entry-card.green { border-left: 3px solid var(--accent); }
  .entry-card.red { border-left: 3px solid var(--red); }

  .entry-top {
    display: flex; align-items: center;
    justify-content: space-between; margin-bottom: 10px;
  }

  .entry-match { font-size: 14px; font-weight: 700; letter-spacing: -0.3px; }

  .badge {
    font-family: var(--mono); font-size: 11px;
    font-weight: 500; padding: 3px 10px;
    border-radius: 20px; letter-spacing: 1px;
  }

  .badge.green { background: rgba(0,229,160,0.12); color: var(--accent); }
  .badge.red { background: rgba(255,59,92,0.12); color: var(--red); }

  .entry-meta { display: flex; gap: 20px; flex-wrap: wrap; align-items: flex-start; }

  .meta-item { display: flex; flex-direction: column; gap: 2px; }

  .meta-label {
    font-family: var(--mono); font-size: 9px;
    color: var(--muted); text-transform: uppercase; letter-spacing: 1px;
  }

  .meta-value { font-family: var(--mono); font-size: 13px; color: var(--text); }
  .meta-value.accent { color: var(--accent); }
  .meta-value.muted { color: var(--muted); }

  .gols-pills { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 2px; }

  .gol-pill {
    font-family: var(--mono); font-size: 11px;
    background: rgba(0,132,255,0.12);
    color: var(--accent2);
    padding: 2px 8px; border-radius: 10px;
  }

  .entry-bottom {
    display: flex; align-items: center;
    justify-content: space-between;
    margin-top: 8px; padding-top: 8px;
    border-top: 1px solid var(--border);
  }

  .entry-date { font-family: var(--mono); font-size: 10px; color: var(--muted); }

  .btn-delete {
    background: none; border: none; color: var(--muted);
    cursor: pointer; font-size: 14px; padding: 2px 6px;
    border-radius: 4px; transition: color 0.2s; font-family: var(--mono);
  }

  .btn-delete:hover { color: var(--red); }

  .empty-state { text-align: center; padding: 50px 20px; color: var(--muted); }
  .empty-icon { font-size: 36px; margin-bottom: 12px; opacity: 0.4; }
  .empty-text { font-family: var(--mono); font-size: 12px; letter-spacing: 1px; }
</style>
</head>
<body>

<header>
  <div class="logo-icon">⚽</div>
  <div>
    <div class="logo-text">Bot Tracker</div>
    <div class="logo-sub">Over HT 0.5</div>
  </div>
</header>

<div class="stats-bar">
  <div class="stat-item">
    <div class="stat-value white" id="stat-total">0</div>
    <div class="stat-label">Entradas</div>
  </div>
  <div class="stat-item">
    <div class="stat-value green" id="stat-green">0</div>
    <div class="stat-label">Greens</div>
  </div>
  <div class="stat-item">
    <div class="stat-value red" id="stat-red">0</div>
    <div class="stat-label">Reds</div>
  </div>
  <div class="stat-item">
    <div class="stat-value blue" id="stat-rate">—</div>
    <div class="stat-label">Taxa</div>
  </div>
</div>

<div class="form-section">
  <div class="form-title">Nova Entrada</div>

  <div class="form-grid">
    <div class="field">
      <label>Data</label>
      <input type="date" id="f-data">
    </div>
    <div class="field">
      <label>Liga</label>
      <input type="text" id="f-liga" placeholder="Ex: Bundesliga">
    </div>
  </div>

  <div class="field" style="margin-bottom:10px">
    <label>Jogo</label>
    <input type="text" id="f-jogo" placeholder="Ex: Arsenal vs Chelsea">
  </div>

  <div class="field" style="margin-bottom:10px">
    <label>Min. Entrada</label>
    <input type="number" id="f-minuto" placeholder="Ex: 8" min="1" max="45">
  </div>

  <div class="gols-label">Minutos dos Gols</div>
  <div class="gols-list" id="gols-list">
    <div class="gol-row">
      <input type="number" placeholder="Min. gol (ex: 23)" min="1" max="120" class="gol-input">
      <button class="btn-remove-gol" onclick="removeGol(this)">✕</button>
    </div>
  </div>
  <button class="btn-add-gol" onclick="addGolField()">+ Adicionar Gol</button>

  <div class="field" style="margin-bottom:10px">
    <label>Resultado</label>
  </div>
  <div class="result-selector">
    <div class="result-btn" id="btn-green" onclick="selectResult('green')">✅ Green</div>
    <div class="result-btn" id="btn-red" onclick="selectResult('red')">❌ Red</div>
  </div>

  <button class="btn-add" onclick="addEntry()">+ Adicionar Entrada</button>
  <button class="btn-export" onclick="exportData()">⬇ Exportar JSON</button>
</div>

<div class="table-section">
  <div class="table-header">
    <div class="table-title">Histórico</div>
    <div class="entry-count" id="entry-count">0 entradas</div>
  </div>
  <div class="entries-list" id="entries-list">
    <div class="empty-state">
      <div class="empty-icon">📋</div>
      <div class="empty-text">Nenhuma entrada ainda</div>
    </div>
  </div>
</div>

<script>
  const STORAGE_KEY = 'bottracker_overht_v3';
  let entries = [];
  let selectedResult = '';

  function load() {
    try {
      const saved = localStorage.getItem(STORAGE_KEY);
      if (saved) entries = JSON.parse(saved);
    } catch(e) { entries = []; }
    document.getElementById('f-data').valueAsDate = new Date();
    render();
  }

  function save() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(entries));
  }

  function selectResult(r) {
    selectedResult = r;
    ['green','red'].forEach(x => {
      const btn = document.getElementById('btn-' + x);
      btn.className = 'result-btn';
      if (x === r) btn.classList.add('selected-' + r);
    });
  }

  function addGolField() {
    const list = document.getElementById('gols-list');
    const row = document.createElement('div');
    row.className = 'gol-row';
    row.innerHTML = `
      <input type="number" placeholder="Min. gol (ex: 23)" min="1" max="120" class="gol-input">
      <button class="btn-remove-gol" onclick="removeGol(this)">✕</button>
    `;
    list.appendChild(row);
  }

  function removeGol(btn) {
    const list = document.getElementById('gols-list');
    if (list.children.length > 1) {
      btn.parentElement.remove();
    } else {
      btn.previousElementSibling.value = '';
    }
  }

  function getGols() {
    const inputs = document.querySelectorAll('.gol-input');
    const gols = [];
    inputs.forEach(inp => {
      const val = parseInt(inp.value);
      if (!isNaN(val) && val > 0) gols.push(val);
    });
    return gols;
  }

  function addEntry() {
    const data = document.getElementById('f-data').value;
    const liga = document.getElementById('f-liga').value.trim();
    const jogo = document.getElementById('f-jogo').value.trim();
    const minuto = document.getElementById('f-minuto').value;
    const gols = getGols();

    if (!data || !jogo || !minuto || !selectedResult) {
      alert('Preencha: data, jogo, minuto de entrada e resultado!');
      return;
    }

    entries.unshift({
      id: Date.now(),
      data, liga, jogo,
      minuto: parseInt(minuto),
      gols,
      resultado: selectedResult
    });

    save();
    clearForm();
    render();
  }

  function clearForm() {
    document.getElementById('f-liga').value = '';
    document.getElementById('f-jogo').value = '';
    document.getElementById('f-minuto').value = '';
    document.getElementById('f-data').valueAsDate = new Date();
    // Reset gols list to one empty field
    document.getElementById('gols-list').innerHTML = `
      <div class="gol-row">
        <input type="number" placeholder="Min. gol (ex: 23)" min="1" max="120" class="gol-input">
        <button class="btn-remove-gol" onclick="removeGol(this)">✕</button>
      </div>`;
    selectedResult = '';
    ['green','red'].forEach(x => {
      document.getElementById('btn-' + x).className = 'result-btn';
    });
  }

  function deleteEntry(id) {
    if (!confirm('Remover esta entrada?')) return;
    entries = entries.filter(e => e.id !== id);
    save();
    render();
  }

  function exportData() {
    if (entries.length === 0) { alert('Nenhuma entrada para exportar!'); return; }
    const blob = new Blob([JSON.stringify(entries, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'bottracker_' + new Date().toISOString().slice(0,10) + '.json';
    a.click();
    URL.revokeObjectURL(url);
  }

  function render() {
    const greens = entries.filter(e => e.resultado === 'green').length;
    const reds = entries.filter(e => e.resultado === 'red').length;
    const total = entries.length;
    const rate = (greens + reds) > 0 ? Math.round((greens / (greens + reds)) * 100) : null;

    document.getElementById('stat-total').textContent = total;
    document.getElementById('stat-green').textContent = greens;
    document.getElementById('stat-red').textContent = reds;
    document.getElementById('stat-rate').textContent = rate !== null ? rate + '%' : '—';
    document.getElementById('entry-count').textContent = total + ' ' + (total === 1 ? 'entrada' : 'entradas');

    const list = document.getElementById('entries-list');

    if (entries.length === 0) {
      list.innerHTML = `<div class="empty-state"><div class="empty-icon">📋</div><div class="empty-text">Nenhuma entrada ainda</div></div>`;
      return;
    }

    list.innerHTML = entries.map(e => {
      const dataFmt = e.data ? new Date(e.data + 'T12:00:00').toLocaleDateString('pt-BR') : '—';
      const golsHtml = e.gols && e.gols.length > 0
        ? e.gols.map(g => `<span class="gol-pill">${g}'</span>`).join('')
        : '<span style="font-family:var(--mono);font-size:11px;color:var(--muted)">—</span>';

      return `
        <div class="entry-card ${e.resultado}">
          <div class="entry-top">
            <div class="entry-match">${e.jogo}</div>
            <div class="badge ${e.resultado}">${e.resultado === 'green' ? '✅ Green' : '❌ Red'}</div>
          </div>
          <div class="entry-meta">
            <div class="meta-item">
              <div class="meta-label">Min. Entrada</div>
              <div class="meta-value accent">${e.minuto}'</div>
            </div>
            <div class="meta-item">
              <div class="meta-label">Gols</div>
              <div class="gols-pills">${golsHtml}</div>
            </div>
          </div>
          <div class="entry-bottom">
            <div class="entry-date">${dataFmt}${e.liga ? ' · ' + e.liga : ''}</div>
            <button class="btn-delete" onclick="deleteEntry(${e.id})">✕</button>
          </div>
        </div>
      `;
    }).join('');
  }

  load();
</script>
</body>
</html>
