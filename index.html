<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BET SCOUT v4</title>
<style>
  :root {
    --surface: #1e1e1e;
    --border: #555;
    --text: #fff;
    --mono: monospace;
    --green: #4caf50;
    --red: #f44336;
    --yellow: #ffc107;
  }
  body { background:#111; color:var(--text); font-family:var(--mono); padding:20px; }
  .card { background:var(--surface); border:1px solid var(--border); border-radius:8px; padding:15px; margin-bottom:20px; }
  .slabel { font-weight:bold; margin-bottom:8px; }
  textarea { width:100%; height:120px; background:var(--surface); border:1px solid var(--border); border-radius:8px; color:var(--text); padding:10px; font-family:var(--mono); }
  button { padding:10px 15px; border:none; border-radius:5px; background:#2196f3; color:#fff; font-weight:bold; cursor:pointer; }
  table { width:100%; border-collapse:collapse; margin-top:15px; }
  th,td { border:1px solid var(--border); padding:5px 10px; text-align:center; }
  th { background:#222; }
  .green { color:var(--green); font-weight:bold; }
  .red { color:var(--red); font-weight:bold; }
</style>
</head>
<body>

<div class="card">
  <div class="slabel">COLAR ESTATÍSTICAS</div>
  <textarea id="inputStats" placeholder="Cole aqui as estatísticas do jogo..."></textarea>
  <button onclick="analisarTexto()">⚡ ANALISAR TEXTO</button>
</div>

<div class="card">
  <div class="slabel">RESULTADO DA ANÁLISE</div>
  <div id="resultado">Nenhuma análise realizada.</div>
</div>

<div class="card">
  <div class="slabel">HISTÓRICO</div>
  <table id="historico">
    <thead>
      <tr>
        <th>Jogo</th>
        <th>Previsão</th>
        <th>Resultado</th>
        <th>Status</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>
</div>

<script>
let jogoCount = 0;

function analisarTexto() {
  const texto = document.getElementById("inputStats").value;
  if (!texto) return;

  const dados = extrairDados(texto);
  preencherCampos(dados);

  const decisao = calcularDecisao(dados);
  mostrarResultado(decisao);
  atualizarHistorico(decisao);
}

function extrairDados(texto) {
  function pegarNumeros(regex) {
    const match = texto.match(regex);
    if (!match) return [0,0];
    return match[0].match(/\d+\.?\d*/g).map(Number);
  }

  return {
    posse: pegarNumeros(/Posse de bola.*$/im),
    gm: pegarNumeros(/Média de gols por partida.*$/im),
    gs: pegarNumeros(/Média de gols sofridos.*$/im),
    cg: pegarNumeros(/Chutes no Gol.*$/im),
    cf: pegarNumeros(/Chutes Fora.*$/im),
    ap: pegarNumeros(/Ataques Perigosos.*$/im),
    at: pegarNumeros(/Ataques[^P].*$/im),
    esc: pegarNumeros(/escanteios.*$/im),
  };
}

function preencherCampos(d) {
  document.getElementById('posse_h')?.value = d.posse[0] || '';
  document.getElementById('posse_a')?.value = d.posse[1] || '';
  document.getElementById('gm_h')?.value = d.gm[0] || '';
  document.getElementById('gm_a')?.value = d.gm[1] || '';
  document.getElementById('gs_h')?.value = d.gs[0] || '';
  document.getElementById('gs_a')?.value = d.gs[1] || '';
  document.getElementById('cg_h')?.value = d.cg[0] || '';
  document.getElementById('cg_a')?.value = d.cg[1] || '';
  document.getElementById('cf_h')?.value = d.cf[0] || '';
  document.getElementById('cf_a')?.value = d.cf[1] || '';
  document.getElementById('ap_h')?.value = d.ap[0] || '';
  document.getElementById('ap_a')?.value = d.ap[1] || '';
  document.getElementById('at_h')?.value = d.at[0] || '';
  document.getElementById('at_a')?.value = d.at[1] || '';
  document.getElementById('esc_h')?.value = d.esc[0] || '';
  document.getElementById('esc_a')?.value = d.esc[1] || '';
}

function calcularDecisao(d) {
  // Cálculo simplificado de indicadores
  const chutes_h = d.cg[0] + d.cf[0];
  const chutes_a = d.cg[1] + d.cf[1];
  const ap_total = d.ap[0] + d.ap[1];
  const cg_total = d.cg[0] + d.cg[1];
  const score = ap_total + cg_total;

  let decision = 'SKIP';
  let decSub = 'Baixa confiança';

  // Critérios baseados no seu histórico v3.8
  if (score < 30) {
    decision = 'SKIP';
    decSub = 'Pouca confiança';
  } else if (d.ap[0] - d.ap[1] > 30 && d.cg[0] > 4.5) {
    decision = `ML Casa`;
    decSub = 'Jogo de domínio';
  } else if (cg_total > 8 && ap_total > 90) {
    decision = 'Over 1.5 FT';
    decSub = 'Jogo aberto';
  } else {
    decision = '+0.5 padrão';
    decSub = 'Baixo volume';
  }

  return { decision, decSub };
}

function mostrarResultado(decisao) {
  const resultado = document.getElementById('resultado');
  resultado.innerHTML = `<b>Decisão:</b> ${decisao.decision} <br><b>Sub:</b> ${decisao.decSub}`;
}

function atualizarHistorico(decisao) {
  jogoCount++;
  const tbody = document.querySelector('#historico tbody');
  const status = (decisao.decision.includes('SKIP')) ? 'RED' : 'GREEN';
  const resultado = status === 'GREEN' ? '✔' : '✖';
  const tr = document.createElement('tr');
  tr.innerHTML = `<td>${jogoCount}</td><td>${decisao.decision}</td><td>${resultado}</td><td class="${status.toLowerCase()}">${status}</td>`;
  tbody.prepend(tr);
}
</script>

</body>
</html>
