<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BET SCOUT v4</title>
<style>
  :root {
    --surface: #1e1e1e;
    --text: #ffffff;
    --border: #444;
    --mono: "Space Mono", monospace;
    --green: #4caf50;
    --red: #f44336;
    --yellow: #ffeb3b;
  }
  body {
    background: var(--surface);
    color: var(--text);
    font-family: var(--mono);
    padding: 20px;
  }
  .card { background:#2c2c2c; border-radius:8px; padding:15px; margin-bottom:20px; }
  .slabel { font-weight:bold; margin-bottom:5px; }
  input, textarea { width:100%; margin-bottom:10px; border-radius:6px; padding:8px; border:1px solid var(--border); background:var(--surface); color:var(--text); }
  button { padding:10px; border:none; border-radius:6px; cursor:pointer; background:#2196f3; color:#fff; font-weight:bold; }
  table { width:100%; border-collapse:collapse; margin-top:15px; }
  th, td { border:1px solid var(--border); padding:6px; text-align:center; }
  th { background:#333; }
</style>
</head>
<body>

<h1>BET SCOUT v4</h1>

<div class="card">
  <div class="slabel">COLAR ESTATÍSTICAS</div>
  <textarea id="inputStats" placeholder="Cole aqui as estatísticas do jogo..."></textarea>
  <button onclick="analisarTexto()">⚡ ANALISAR TEXTO</button>
</div>

<div class="card">
  <div class="slabel">RESULTADOS PREVISTOS</div>
  <div id="resultado"></div>
</div>

<div class="card">
  <div class="slabel">HISTÓRICO</div>
  <table id="historico">
    <thead>
      <tr>
        <th>Jogo</th>
        <th>Previsão</th>
        <th>Resultado</th>
        <th>Status</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>
</div>

<script>
// Função principal chamada ao colar estatísticas
function analisarTexto() {
  const texto = document.getElementById("inputStats").value;
  const dados = extrairDados(texto);
  preencherCampos(dados);
  analyze(dados);
}

// Extrair números da tabela de estatísticas
function extrairDados(texto) {
  function pegarNumeros(regex) {
    const match = texto.match(regex);
    if (!match) return [0,0];
    return match[0].match(/\d+\.?\d*/g).map(Number);
  }

  return {
    posse: pegarNumeros(/Posse de bola.*$/im),
    gm: pegarNumeros(/Média de gols por partida.*$/im),
    gs: pegarNumeros(/gols sofridos por partida.*$/im),
    cg: pegarNumeros(/Chutes no Gol.*$/im),
    cf: pegarNumeros(/Chutes Fora.*$/im),
    ap: pegarNumeros(/Ataques Perigosos.*$/im),
    at: pegarNumeros(/Ataques[^P].*$/im),
    esc: pegarNumeros(/escanteios.*$/im),
  };
}

// Preenche campos (você pode criar inputs caso queira mostrar)
function preencherCampos(d) {
  console.log("Dados extraídos:", d);
}

// Função de análise baseada no seu v3.8
let historico = [];
function analyze(d) {
  const dom_cg = d.cg[0] || 0;
  const dom_ap = d.ap[0] || 0;
  const dom_name = "Esquerda";
  const cg_total = (d.cg[0]||0)+(d.cg[1]||0);
  const ap_total = (d.ap[0]||0)+(d.ap[1]||0);
  const score = (d.gm[0]||0)+(d.gm[1]||0);

  let gameType = '';
  if (ap_total > 90 && dom_cg > 4.5) gameType = 'dominance';
  else if (cg_total > 8 && ap_total > 90) gameType = 'open';
  else gameType = 'low';

  let decision = '';
  let decSub = '';

  if (score < 1.5) {
    decision = 'SKIP';
    decSub = 'Pouca confiança';
  } else if (gameType === 'dominance') {
    decision = `ML ${dom_name}`;
    decSub = 'Jogo de domínio';
  } else if (gameType === 'open') {
    decision = 'Over 1.5 FT';
    decSub = 'Jogo aberto';
  } else {
    decision = '+0.5 Padrão';
    decSub = 'Baixo volume';
  }

  // Mostra resultado na tela
  document.getElementById("resultado").innerHTML = `<strong>${decision}</strong> - ${decSub}`;

  // Atualiza histórico
  const jogoNum = historico.length+1;
  historico.push({jogo:jogoNum, previsao:decision, resultado:'', status:''});
  atualizarHistorico();
}

function atualizarHistorico() {
  const tbody = document.querySelector("#historico tbody");
  tbody.innerHTML = '';
  historico.forEach(item=>{
    tbody.innerHTML += `<tr>
      <td>${item.jogo}</td>
      <td>${item.previsao}</td>
      <td>${item.resultado}</td>
      <td>${item.status}</td>
    </tr>`;
  });
}
</script>

</body>
</html>
