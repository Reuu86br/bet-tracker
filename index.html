<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>⚽ Bot Tracker</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
:root {
  --bg:#060b14; --card:#0d1525; --border:#1a2744;
  --green:#00e676; --red:#ff1744; --gold:#ffd600;
  --blue:#448aff; --purple:#e040fb; --text:#e8f0fe; --muted:#546e7a;
}
body { background:var(--bg); color:var(--text); font-family:'Courier New',monospace; min-height:100vh; padding-bottom:90px; }
.header { background:linear-gradient(135deg,#0d1525,#0a1a3a); border-bottom:2px solid var(--green); padding:15px 18px; display:flex; justify-content:space-between; align-items:center; position:sticky; top:0; z-index:99; }
.header-title { font-size:16px; font-weight:900; color:var(--green); letter-spacing:3px; }
.header-sub { font-size:9px; color:var(--muted); letter-spacing:1px; margin-top:2px; }
.header-lucro { font-size:15px; font-weight:900; text-align:right; }
.header-info { font-size:9px; color:var(--muted); text-align:right; margin-top:2px; }
.nav { display:flex; gap:6px; padding:10px 14px; background:#080d1a; border-bottom:1px solid var(--border); }
.nav-btn { flex:1; padding:9px 4px; border-radius:8px; border:none; background:var(--card); color:var(--muted); font-weight:900; font-size:10px; cursor:pointer; letter-spacing:1px; font-family:'Courier New',monospace; }
.nav-btn.active { background:var(--green); color:#060b14; }
.view { display:none; padding:16px 14px; }
.view.active { display:block; }
.section-title { font-size:11px; font-weight:900; color:var(--green); letter-spacing:3px; margin-bottom:16px; }
.form-grid { display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-bottom:16px; }
.form-full { grid-column:1/-1; }
label { font-size:9px; color:var(--muted); letter-spacing:2px; text-transform:uppercase; margin-bottom:5px; display:block; }
input, select { width:100%; padding:11px 13px; background:#0a1020; border:1px solid var(--border); border-radius:9px; color:var(--text); font-size:13px; font-family:'Courier New',monospace; outline:none; -webkit-appearance:none; }
.api-box { background:var(--card); border:1px solid var(--gold)44; border-radius:12px; padding:14px; margin-bottom:18px; }
.api-row { display:flex; gap:8px; }
.btn-api { padding:11px 14px; background:var(--gold); border:none; border-radius:9px; color:#060b14; font-weight:900; font-size:11px; cursor:pointer; font-family:'Courier New',monospace; }
.btn-buscar { width:100%; padding:13px; background:var(--blue); border:none; border-radius:10px; color:#fff; font-weight:900; font-size:13px; cursor:pointer; letter-spacing:2px; font-family:'Courier New',monospace; margin-top:10px; }
.err-txt { font-size:11px; color:var(--red); margin:10px 0; display:none; }
</style>
</head>
<body>

<div class="header">
  <div>
    <div class="header-title">⚽ BOT TRACKER</div>
    <div class="header-sub">BOLSA DE APOSTA</div>
  </div>
  <div>
    <div class="header-lucro">R$0.00</div>
    <div class="header-info">0 entradas · 0% green</div>
  </div>
</div>

<div class="nav">
  <button class="nav-btn" onclick="setView('dash')">📊 RESUMO</button>
  <button class="nav-btn active" onclick="setView('add')">➕ ENTRADA</button>
  <button class="nav-btn" onclick="setView('hist')">📜 HISTÓRICO</button>
</div>

<!-- VIEW: ADICIONAR ENTRADA -->
<div id="add" class="view active">
  <div class="section-title">NOVA ENTRADA (GEMINI FREE)</div>
  
  <div class="api-box">
    <label>🗝️ CHAVE DE API GOOGLE (AIza...)</label>
    <div class="api-row">
      <input type="password" id="apiKeyInput" placeholder="Cole sua chave AIza aqui">
      <button class="btn-api" onclick="saveApiKey()">SALVAR</button>
    </div>
    <div id="apiStatus" style="font-size:10px; margin-top:8px;"></div>
  </div>

  <div class="form-grid">
    <div class="form-full">
      <label>NOME DO BOT</label>
      <select id="botName"><option>Casa vencendo 2.5</option></select>
    </div>
    <div><label>TIME CASA</label><input type="text" id="tCasa" value="Palmeiras"></div>
    <div><label>TIME VISITANTE</label><input type="text" id="tVis" value="Botafogo"></div>
    <div><label>MINUTO ENTRADA</label><input type="number" id="minEnt" value="31"></div>
    <div><label>ODD DE ENTRADA</label><input type="text" id="oddEnt" value="1.66"></div>
  </div>

  <div id="errorDisplay" class="err-txt"></div>
  <button class="btn-buscar" onclick="buscarResultado()">📊 BUSCAR RESULTADO</button>
</div>

<!-- Scripts -->
<script>
function setView(v) {
  document.querySelectorAll('.view').forEach(e => e.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(e => e.classList.remove('active'));
  document.getElementById(v).classList.add('active');
  if(window.event) window.event.currentTarget.classList.add('active');
}

function saveApiKey() {
  const key = document.getElementById('apiKeyInput').value.trim();
  const status = document.getElementById('apiStatus');
  if (key.startsWith('AIza')) {
    localStorage.setItem('gemini_key', key);
    status.innerText = "✅ CHAVE GEMINI SALVA COM SUCESSO!";
    status.style.color = "var(--green)";
  } else {
    status.innerText = "❌ Chave inválida! Deve começar com AIza";
    status.style.color = "var(--red)";
  }
}

async function buscarResultado() {
  const key = localStorage.getItem('gemini_key');
  const err = document.getElementById('errorDisplay');
  const btn = document.querySelector('.btn-buscar');
  const casa = document.getElementById('tCasa').value;
  const vis = document.getElementById('tVis').value;

  if (!key) {
    alert("Configure e salve a chave AIza primeiro!");
    return;
  }

  btn.innerText = "⏳ BUSCANDO...";
  err.style.display = "none";

  try {
    // Usando o modelo Gemini 1.5 Flash do Google
    const url = `https://generativelanguage.googleapis.com{key}`;

    const response = await fetch(url, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({
        contents: [{
          parts: [{ text: `Qual foi o placar final do jogo entre ${casa} e ${vis}? Responda apenas o placar (ex: 2-0). Se o jogo não ocorreu, diga 'Indisponível'.` }]
        }]
      })
    });

    if (!response.ok) {
       const errorData = await response.json();
       throw new Error("Erro na Chave: " + (errorData.error.message || "Verifique sua conexão"));
    }

    const data = await response.json();
    
    // Acessando o texto da resposta corretamente
    if (data.candidates && data.candidates[0].content.parts[0].text) {
        const placar = data.candidates[0].content.parts[0].text;
        alert("⚽ RESULTADO: " + placar);
    } else {
        throw new Error("Resposta vazia do Google.");
    }

  } catch (e) {
    console.error(e);
    err.innerText = "⚠️ " + e.message;
    err.style.display = "block";
  } finally {
    btn.innerText = "📊 BUSCAR RESULTADO";
  }
}
</script>
</body>
</html>
